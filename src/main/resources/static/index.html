<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind — RAG Chatbot</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" href="/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="dot-indicator">
                    <span class="dot"></span>
                    <span class="dot-label">DocuMind</span>
                </div>
                <h1>RAG Chatbot</h1>
                <p class="subtitle">Retrieval Augmented Generation</p>
            </div>

            <div class="upload-section">
                <div class="section-label">Upload Document</div>
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <p>Drag & drop a PDF here</p>
                    <p class="upload-hint">or click to browse files</p>
                    <input type="file" id="fileInput" accept=".pdf" multiple hidden>
                </div>
                <div class="upload-status" id="uploadStatus" hidden>
                    <div class="status-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <div class="status-text">
                        <span id="statusFileName"></span>
                        <small id="statusDetails"></small>
                    </div>
                </div>
                <div class="upload-progress" id="uploadProgress" hidden>
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                    <small class="progress-label" id="progressLabel">0 / 0</small>
                </div>
            </div>

            <div class="documents-section">
                <div class="section-label">Documents</div>
                <div id="documentList" class="document-list">
                    <p class="empty-state">No documents uploaded</p>
                </div>
            </div>

            <div class="user-section">
                <div class="user-info">
                    <span class="user-avatar" id="userAvatar"></span>
                    <span class="user-name" id="userName"></span>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Logout
                </button>
            </div>
        </aside>

        <main class="chat-area">
            <div class="chat-header">
                <div class="dot-indicator">
                    <span class="dot"></span>
                    <span class="dot-label">Chat</span>
                </div>
                <h2>Ask a Question</h2>
                <p>Ask questions about your uploaded documents</p>
            </div>

            <div class="messages" id="messages">
                <div class="message welcome">
                    <div class="avatar bot">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2a4 4 0 014 4v2a4 4 0 01-8 0V6a4 4 0 014-4z"/>
                            <path d="M20 18v2a4 4 0 01-4 4H8a4 4 0 01-4-4v-2"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </div>
                    <div class="bubble">
                        <p>Upload a PDF document to get started, then ask me anything about it.</p>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <form id="questionForm" autocomplete="off">
                    <input type="text" id="questionInput" placeholder="Ask a question about your documents..." disabled>
                    <button type="submit" id="sendBtn" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
