<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — DocuMind</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-paper);
            height: 100vh;
        }
        .auth-container {
            width: 380px;
            background: var(--surface-paper);
            border: 1px solid var(--color-pewter-rule);
            border-radius: var(--radius-md);
            padding: var(--spacing-36) var(--spacing-32);
        }
        .auth-container .dot-indicator {
            display: flex;
            align-items: center;
            gap: var(--spacing-8);
            margin-bottom: var(--spacing-16);
        }
        .auth-container .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-signal-orange);
            flex-shrink: 0;
        }
        .auth-container .dot-label {
            font-family: var(--font-geist-mono);
            font-size: 12px;
            letter-spacing: -0.2px;
            text-transform: uppercase;
            color: var(--color-ink);
        }
        .auth-container h1 {
            font-family: var(--font-geist);
            font-size: var(--text-heading-sm);
            font-weight: 400;
            letter-spacing: var(--tracking-heading-sm);
            color: var(--color-ink);
            margin-bottom: var(--spacing-4);
        }
        .auth-container .subtitle {
            font-size: var(--text-body-sm);
            letter-spacing: var(--tracking-body-sm);
            color: var(--color-iron-caption);
            margin-bottom: var(--spacing-28);
        }
        .form-group {
            margin-bottom: var(--spacing-16);
        }
        .form-group label {
            display: block;
            font-family: var(--font-geist-mono);
            font-size: 11px;
            letter-spacing: -0.2px;
            text-transform: uppercase;
            color: var(--color-graphite-body);
            margin-bottom: var(--spacing-6);
        }
        .form-group input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--color-pewter-rule);
            border-radius: var(--radius-md);
            font-family: var(--font-geist);
            font-size: var(--text-body-sm);
            letter-spacing: var(--tracking-body-sm);
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
            color: var(--color-ink);
            background: var(--surface-paper);
        }
        .form-group input::placeholder {
            color: var(--color-stone-mid);
        }
        .form-group input:focus {
            border-color: var(--color-ink);
        }
        .btn-primary {
            width: 100%;
            padding: 10px;
            background: var(--surface-inverse);
            color: var(--surface-paper);
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-geist-mono);
            font-size: 12px;
            letter-spacing: -0.2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: var(--spacing-8);
        }
        .btn-primary:hover { background: var(--color-carbon); }
        .btn-primary:disabled { background: var(--color-stone-mid); cursor: not-allowed; }
        .auth-footer {
            text-align: center;
            margin-top: var(--spacing-20);
            font-size: var(--text-body-sm);
            letter-spacing: var(--tracking-body-sm);
            color: var(--color-iron-caption);
        }
        .auth-footer a {
            color: var(--color-ink);
            text-decoration: none;
            font-family: var(--font-geist-mono);
            font-size: 12px;
            letter-spacing: -0.2px;
            text-transform: uppercase;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .error-msg {
            border: 1px solid var(--color-ember-edge);
            color: var(--color-ember-edge);
            padding: var(--spacing-10) var(--spacing-12);
            border-radius: var(--radius-md);
            font-size: var(--text-body-sm);
            letter-spacing: var(--tracking-body-sm);
            margin-bottom: var(--spacing-16);
            display: none;
            background: rgba(209,80,16,0.04);
        }
        .error-msg.show { display: block; }
        .logo-mark {
            font-family: var(--font-geist-mono);
            font-size: 14px;
            letter-spacing: -0.2px;
            color: var(--color-ink);
            margin-bottom: var(--spacing-24);
            display: flex;
            align-items: center;
            gap: var(--spacing-8);
        }
        .logo-mark svg {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 2a4 4 0 014 4v2a4 4 0 01-8 0V6a4 4 0 014-4z"/>
                <path d="M20 18v2a4 4 0 01-4 4H8a4 4 0 01-4-4v-2"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            DOCUMIND
        </div>

        <div class="dot-indicator">
            <span class="dot"></span>
            <span class="dot-label">Create Account</span>
        </div>

        <h1>Get started</h1>
        <p class="subtitle">Create your account to start using DocuMind</p>

        <div class="error-msg" id="errorMsg"></div>

        <form id="signupForm" autocomplete="off">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="btn-primary" id="signupBtn">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login.html">Sign in</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            const errorEl = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            errorEl.classList.remove('show');

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.message || 'Signup failed');
                }

                const data = await res.json();
                localStorage.setItem('rag_chatbot_token', data.token);
                localStorage.setItem('rag_chatbot_user', JSON.stringify({ email: data.email, name: data.name || '' }));
                window.location.href = '/';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
